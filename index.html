<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Life Task Manager</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  padding:20px;
  background:#f4f4f4;
}

h1{
  text-align:center;
  margin-bottom:30px;
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(200px,1fr));
  gap:20px;
}

.section-card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  text-align:center;
}

.section-card img{
  width:100%;
  height:auto;        /* keeps full image */
  object-fit:contain; /* ensures nothing is cropped */
}

.section-card h2{
  margin:15px 0;
}
</style>

</head>

<body>

<h1>Home Life Manager</h1>

<div class="container">

<div class="section-card">
<img src="https://picsum.photos/400/200?random=1" alt="Daily Life">
<h2>Daily Life</h2>
</div>

<div class="section-card">
<img src="https://picsum.photos/400/200?random=2" alt="Kitchen">
<h2>Kitchen</h2>
</div>

<div class="section-card">
<img src="https://picsum.photos/400/200?random=3" alt="Laundry">
<h2>Laundry</h2>
</div>

<div class="section-card">
<img src="https://picsum.photos/400/200?random=4" alt="Cleaning">
<h2>Cleaning</h2>
</div>

<div class="section-card">
<img src="https://picsum.photos/400/200?random=5" alt="Groceries">
<h2>Groceries</h2>
</div>

<div class="section-card">
<img src="https://picsum.photos/400/200?random=6" alt="Bills">
<h2>Bills</h2>
</div>

<div class="section-card">
<img src="https://picsum.photos/400/200?random=7" alt="Kids">
<h2>Kids</h2>
</div>

<div class="section-card">
<img src="https://picsum.photos/400/200?random=8" alt="Pets">
<h2>Pets</h2>
</div>

<div class="section-card">
<img src="https://picsum.photos/400/200?random=9" alt="Garden">
<h2>Garden</h2>
</div>

<div class="section-card">
<img src="https://picsum.photos/400/200?random=10" alt="Repairs">
<h2>Repairs</h2>
</div>

<div class="section-card">
<img src="https://picsum.photos/400/200?random=11" alt="Health">
<h2>Health</h2>
</div>

<div class="section-card">
<img src="https://picsum.photos/400/200?random=12" alt="Planner">
<h2>Planner</h2>
</div>

</div>

</body>
</html>
